name: Theme Check

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Theme Check
        uses: shopify/theme-check-action@v2
        with:
          theme_root: .
          flags: --fail-level suggestion
          token: ${{ github.token }}
          base: main
